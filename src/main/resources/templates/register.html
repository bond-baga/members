<!DOCTYPE html>
<html xmlns="ctp://www.w3.org/1999/xhtml" 
      xmlns:th="https://www.thymeleaf.org"
      class="register">
	
<head>
  <meta charset="UTF-8">
　<link rel="stylesheet" href="./css/example.css">
  <script src="./js/jquery-3.7.1.js"> </script>
  <script src="./js/main.js"></script>
  <title>login</title>
</head>

<header class="header">
	<div class="box">
  		<p></p>
  		<p><span class="title"><label id="title"></label></span></p>  
  		<p></p>		
	</div>	
</header>

<body>
    <div class="slightly-left">
	<h3>新規のユーザーアカウントが登録できます。</h3>     
    <p class="error" th:if="${map.exists}">入力されたアカウントは登録済みです。</p>
    <p class="error" th:if="${map.failed}">入力されたアカウントは登録できませんでした。</p>
    </div>
      
    <form class="center" th:action="@{/register}" method="post" th:object="${LoginForm}">
	<table>
        <tr>
            <td>ユーザーID</td>
            <td><input type="text" th:field=*{username} required/></td>
        </tr>          
        <tr>
            <td>パスワード</td>
            <td><input type="password" th:field=*{password} required/></td>
        </tr>

        <tr>
            <td>氏名</td>
            <td><input type="text" th:field=*{fullname} required/></td>
        </tr>          
        <tr>
            <td>e-mail</td>
            <td><input type="email" th:field=*{email} required/></td>
        </tr>
        <tr>
            <td></td>
            <td>
				<button type="button" onclick="history.back()">戻る</button>
    			<input type="submit" value="登録" />
   				<button type="reset">Reset</button>
            </td>
        </tr>
    </table>    
    </form>
    
<footer class="footer">
    <p>© All rights reserved by PALM</p>
</footer>

<script th:inline="javascript">		
	
window.onload =  function() {
	let title = /*[[${title}]]*/"title";
    let element_title = document.getElementById("title");	
	element_title.textContent = title;
}
    
</script>

</body>
</html>
